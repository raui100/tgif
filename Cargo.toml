[package]
name = "tgif"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
clap = { version = "3.1.17", features = ["derive"] }
log = "0.4.0"
env_logger = "0.9.0"
nshare = {version = "0.9.0", features = ["image", "ndarray"]}
image = "0.24.2"
ndarray = { version = "0.15.4", features = ["rayon"]}
rayon = "1.5.2"
chrono = "0.4"
array-init = "2.0.0"
bit-vec = "0.6.3"
arrayvec = "0.7.2"
glob = "0.3.0"
itertools = "0.10.3"
huffman-compress = "0.6.1"
rand = "0.8.5"